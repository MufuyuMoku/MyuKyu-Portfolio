    <style>
        #void-curtain {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #08080b;
            z-index: 9999999; pointer-events: none;
            transform: translateY(100%);
            transition: transform 0.6s cubic-bezier(0.85, 0, 0.15, 1);
        }
        body.is-transitioning #void-curtain { transform: translateY(0); }
        body.is-loading #void-curtain { transform: translateY(0); transition: none; }
        body.is-loaded #void-curtain { transform: translateY(-100%); }
    </style>
</head>

<style>
     
    body.section-music { overflow: auto !important; }
    
    .music-hologram {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 800px;
        margin: 15vh auto 5rem auto;  
        background: rgba(10, 10, 15, 0.6);
        backdrop-filter: blur(12px);  
        border: 1px solid rgba(57, 197, 187, 0.3);
        border-radius: 12px;
        padding: 4rem;
        box-shadow: 0 0 40px rgba(57, 197, 187, 0.1);
        color: #e2e8f0;
    }
    .btn-back {
        display: inline-block;
        color: #39c5bb;
        text-decoration: none;
        text-transform: uppercase;
        font-family: 'JetBrains Mono', monospace;
        letter-spacing: 2px;
        font-size: 0.8rem;
        margin-bottom: 2rem;
        transition: color 0.2s;
    }
    .btn-back:hover { color: #ff8b94; }
    
    .track-title {
        font-family: 'Playfair Display', serif;
        font-size: 3.5rem;
        color: #fff;
        margin: 0 0 0.5rem 0;
        text-shadow: 0 0 15px rgba(255,255,255,0.3);
    }
    .track-meta {
        color: #ff8b94;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.9rem;
        margin-bottom: 3rem;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 1.5rem;
    }
    .hologram-content p { line-height: 1.8; margin-bottom: 1.5rem; }
</style>

    </div>

    </main>

    <script src="/js/main.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            requestAnimationFrame(() => {
                document.body.classList.remove('is-loading');
                document.body.classList.add('is-loaded');
            });
        });

        window.addEventListener('pageshow', (event) => {
            if (event.persisted) {
                document.body.classList.remove('is-transitioning');
                document.body.classList.add('is-loaded');
            }
        });

        document.addEventListener('click', (e) => {
            const link = e.target.closest('a');
            if (!link) return;

            const href = link.getAttribute('href');
            if (href && href.startsWith('/') && !href.startsWith('#') && link.target !== '_blank') {
                e.preventDefault(); 
                
                document.body.classList.remove('is-loaded');
                document.body.classList.add('is-transitioning');
                
                setTimeout(() => {
                    window.location.href = href;
                }, 600); 
            }
        });
    </script>
</body>
</html>
