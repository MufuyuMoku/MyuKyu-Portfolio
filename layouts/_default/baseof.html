<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title | default "Home" }} | MyuKyu</title>
    
    <link rel="stylesheet" href="/css/main.css">

    {{ if eq .Section "projects" }}
        <link rel="stylesheet" href="/css/theme-terminal-pastel.css">
    {{ else if eq .Section "music" }}
        <link rel="stylesheet" href="/css/theme-polaris.css">
    {{ else if eq .Section "lore" }}
        <link rel="stylesheet" href="/css/theme-detective.css">
    {{ else if eq .Section "visuals" }}
        <link rel="stylesheet" href="/css/theme-looping.css">
    {{ else if eq .Section "chat" }}
        <link rel="stylesheet" href="/css/theme-pale-chat.css">
    {{ end }}

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=Inter:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        #void-curtain {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #08080b;
            z-index: 9999999; pointer-events: none;
            transform: translateY(100%);
            transition: transform 0.6s cubic-bezier(0.85, 0, 0.15, 1);
        }
        body.is-transitioning #void-curtain { transform: translateY(0); }
        body.is-loading #void-curtain { transform: translateY(0); transition: none; }
        body.is-loaded #void-curtain { transform: translateY(-100%); }
    </style>
</head>

<body class="section-{{ .Section | default "home" }} is-loading">
    
    <div id="void-curtain"></div>

    {{ if not .IsHome }}
    <nav class="global-nav">
        <a href="/" class="brand">MyuKyu</a>
        <div class="links">
            <a href="/projects/">Projects</a>
            <a href="/music/">Music</a>
            <a href="/lore/">Lore</a>
            <a href="/visuals/">Visuals</a>
            <a href="/chat/">Chat</a>
        </div>
    </nav>
    {{ end }}

    <main>
        {{ block "main" . }}{{ end }}
    </main>

    <script src="/js/main.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            requestAnimationFrame(() => {
                document.body.classList.remove('is-loading');
                document.body.classList.add('is-loaded');
            });
        });

        window.addEventListener('pageshow', (event) => {
            if (event.persisted) {
                document.body.classList.remove('is-transitioning');
                document.body.classList.add('is-loaded');
            }
        });

        document.addEventListener('click', (e) => {
            const link = e.target.closest('a');
            if (!link) return;

            const href = link.getAttribute('href');
            if (href && href.startsWith('/') && !href.startsWith('#') && link.target !== '_blank') {
                e.preventDefault(); 
                
                document.body.classList.remove('is-loaded');
                document.body.classList.add('is-transitioning');
                
                setTimeout(() => {
                    window.location.href = href;
                }, 600); 
            }
        });
    </script>
</body>
</html>
