{{ define "main" }}
<style>
    body.section-visuals { background-color: #050505; overflow: auto; padding: 0; }
    
    .visual-exhibition {
        max-width: 1400px; margin: 5rem auto 3rem auto; padding: 0 2rem;
        display: flex; flex-direction: column; align-items: center;
    }
    
    .main-canvas {
        width: 100%; max-height: 75vh; object-fit: contain;
        border-radius: 4px; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        margin-bottom: 2rem;
    }
    
    .visual-meta {
        width: 100%; display: flex; justify-content: space-between; align-items: flex-start;
        border-top: 1px solid #222; padding-top: 2rem; color: #fff;
    }
    
    .v-title { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin: 0 0 0.5rem 0; font-style: italic; }
    .v-date { font-family: 'JetBrains Mono', monospace; color: #666; font-size: 0.9rem; letter-spacing: 2px; }
    .v-desc { max-width: 500px; line-height: 1.6; color: #a1a1aa; font-family: 'Inter', sans-serif; }
    
    .btn-close-gallery {
        position: fixed; top: 2rem; right: 3rem; color: #fff;
        font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; font-weight: bold;
        text-decoration: none; z-index: 100; opacity: 0.3; transition: opacity 0.2s;
    }
    .btn-close-gallery:hover { opacity: 1; color: #39c5bb; }
</style>

<a href="/visuals/" class="btn-close-gallery">[ X ] RETURN TO STREAM</a>

<div class="visual-exhibition">
    <img src="https://picsum.photos/seed/{{ .File.TranslationBaseName }}1/1200/800" class="main-canvas" alt="{{ .Title }}">
    
    <div class="visual-meta">
        <div>
            <h1 class="v-title">{{ .Title }}</h1>
            <div class="v-date">RENDERED: {{ .Date.Format "2006.01.02" }}</div>
        </div>
        <div class="v-desc markdown-content">
            {{ .Content }}
        </div>
    </div>
</div>
{{ end }}
