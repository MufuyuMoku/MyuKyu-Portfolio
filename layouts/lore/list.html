{{ define "main" }}
<div class="board-viewport" id="viewport">
    <div class="infinite-canvas" id="canvas">
        
        <svg id="red-strings"></svg>

        {{ range $index, $page := .Pages }}
        <a href="{{ .Permalink }}" class="evidence-node style-{{ if eq (mod $index 3) 0 }}note{{ else if eq (mod $index 3) 1 }}doc{{ else }}photo{{ end }}" id="node-{{ $index }}">
            
            {{ if eq (mod $index 3) 1 }}<div class="classified-stamp">RESTRICTED</div>{{ end }}
            <div class="evidence-title">{{ .Title }}</div>
            <div class="evidence-excerpt">{{ .Summary | truncate 60 }}</div>
            
        </a>
        {{ end }}

    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const viewport = document.getElementById('viewport');
    const canvas = document.getElementById('canvas');
    const nodes = Array.from(document.querySelectorAll('.evidence-node'));
    const svg = document.getElementById('red-strings');

    // 1. ENGINE PANNING (DRAG KANVAS)
    let isDragging = false;
    let startX, startY, currentX = 0, currentY = 0;

    viewport.addEventListener('mousedown', (e) => {
        // Jangan drag kanvas kalau yang diklik adalah dokumennya
        if (e.target.closest('.evidence-node')) return; 
        
        isDragging = true;
        startX = e.clientX - currentX;
        startY = e.clientY - currentY;
    });

    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        currentX = e.clientX - startX;
        currentY = e.clientY - startY;
        canvas.style.transform = `translate(${currentX}px, ${currentY}px)`;
    });

    document.addEventListener('mouseup', () => isDragging = false);

    // 2. SCATTER ENGINE (MENYEBAR DOKUMEN SECARA ACAK)
    // Area aman untuk menyebar dokumen agar tidak terlalu ke pinggir kanvas
    const canvasWidth = window.innerWidth * 3;
    const canvasHeight = window.innerHeight * 3;
    const safeMargin = 400; 

    const nodePositions = [];

    nodes.forEach((node, i) => {
        // Acak posisi X dan Y di dalam kanvas
        const x = safeMargin + Math.random() * (canvasWidth - safeMargin * 2);
        const y = safeMargin + Math.random() * (canvasHeight - safeMargin * 2);
        // Acak kemiringan rotasi (-15deg sampai 15deg)
        const rotation = (Math.random() * 30) - 15;

        node.style.left = `${x}px`;
        node.style.top = `${y}px`;
        node.style.transform = `rotate(${rotation}deg)`;

        // Simpan titik pusat dokumen untuk ditarik garis merah nanti
        nodePositions.push({ 
            x: x + (node.offsetWidth / 2), 
            y: y + (node.offsetHeight / 2) 
        });
    });

    // 3. THE RED STRING ENGINE (MENGHUBUNGKAN DOKUMEN)
    if (nodePositions.length > 1) {
        let linesHTML = "";
        // Hubungkan setiap node ke node berikutnya secara sekuensial
        for (let i = 0; i < nodePositions.length - 1; i++) {
            linesHTML += `<line class="string-line" x1="${nodePositions[i].x}" y1="${nodePositions[i].y}" x2="${nodePositions[i+1].x}" y2="${nodePositions[i+1].y}" />`;
        }
        // Tambahkan satu benang acak untuk efek konspirasi yang gila
        const randA = Math.floor(Math.random() * nodePositions.length);
        const randB = Math.floor(Math.random() * nodePositions.length);
        linesHTML += `<line class="string-line" x1="${nodePositions[randA].x}" y1="${nodePositions[randA].y}" x2="${nodePositions[randB].x}" y2="${nodePositions[randB].y}" />`;
        
        svg.innerHTML = linesHTML;
    }
});
</script>
{{ end }}
