{{ define "main" }}
<style>
    body.section-home {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #08080b; 
        color: #e0e0e0;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: 'Inter', sans-serif;
    }

    #home-glow {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: radial-gradient(circle at 50% 50%, rgba(57, 197, 187, 0.12) 0%, transparent 50%); 
        z-index: 1;
        pointer-events: none;
        transition: background 0.1s ease;
    }

    .home-content {
        position: relative;
        z-index: 2;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
    }

    .mascot {
        font-family: 'JetBrains Mono', monospace;
        font-size: 5rem;
        font-weight: bold;
        color: #f4f0f5; 
        letter-spacing: 2px;
        user-select: none;
        cursor: crosshair;
        transition: transform 0.15s ease-out, color 0.3s ease, text-shadow 0.3s ease;
    }
    
    .mascot:hover {
        color: #39c5bb; 
        text-shadow: 0px 0px 20px rgba(57, 197, 187, 0.6);
        transform: scale(1.05) !important;
    }

    .greeting {
        font-family: 'Playfair Display', serif;
        font-size: 2.5rem;
        font-style: italic;
        opacity: 0.7;
        margin: 0;
        letter-spacing: 2px;
    }

    @keyframes float-btn {
        0% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-15px) rotate(2deg); }
        100% { transform: translateY(0px) rotate(0deg); }
    }

    .orbit-btn {
        position: absolute;
        padding: 12px 30px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 50px;
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(8px);
        color: #8892b0;
        text-decoration: none;
        font-size: 0.8rem;
        letter-spacing: 4px;
        text-transform: uppercase;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        animation: float-btn 6s ease-in-out infinite;
        z-index: 10;
    }

    .orbit-btn:hover {
        background: rgba(57, 197, 187, 0.1);
        color: #fff;
        border-color: #39c5bb;
        box-shadow: 0 0 20px rgba(57, 197, 187, 0.3);
        transform: scale(1.1) translateY(-5px) !important;
    }

    #btn-projects { top: 20%; left: 15%; animation-delay: 0s; }
    #btn-music { top: 30%; right: 18%; animation-delay: 1.2s; }
    #btn-lore { bottom: 25%; left: 22%; animation-delay: 2.5s; }
    #btn-visuals { bottom: 20%; right: 25%; animation-delay: 0.8s; }
    #btn-chat { top: 12%; right: 45%; animation-delay: 1.8s; }
</style>

<div id="home-glow"></div>

<a href="/projects/" class="orbit-btn" id="btn-projects">Projects</a>
<a href="/music/" class="orbit-btn" id="btn-music">Music</a>
<a href="/lore/" class="orbit-btn" id="btn-lore">Lore</a>
<a href="/visuals/" class="orbit-btn" id="btn-visuals">Visuals</a>
<a href="/chat/" class="orbit-btn" id="btn-chat">Chat</a>

<div class="home-content">
    <div class="mascot" id="myukyu-face">[ - _ - ]</div>
    <h1 class="greeting">System Idle.</h1>
</div>

<script>
    const face = document.getElementById('myukyu-face');
    const glow = document.getElementById('home-glow');
    
    const faces = {
        sleep: "[ - _ - ]",
        awake: "[ o _ o ]",
        lookLeft: "[ < _ < ]",
        lookRight: "[ > _ > ]",
        happy: "[ ^ _ ^ ]",
        clicked: "[ > _ < ]"
    };

    let isIdle = false;
    let idleTimer;

    const resetIdle = () => {
        clearTimeout(idleTimer);
        isIdle = false;
        idleTimer = setTimeout(() => {
            isIdle = true;
            face.textContent = faces.sleep;
        }, 3000); 
    };

    document.addEventListener('mousemove', (e) => {
        resetIdle();

        const x = (e.clientX / window.innerWidth) * 100;
        const y = (e.clientY / window.innerHeight) * 100;
        glow.style.background = `radial-gradient(circle at ${x}% ${y}%, rgba(57, 197, 187, 0.15) 0%, transparent 45%)`;

        const faceRect = face.getBoundingClientRect();
        const faceCenterX = faceRect.left + faceRect.width / 2;
        const faceCenterY = faceRect.top + faceRect.height / 2;

        const moveX = (e.clientX - faceCenterX) * 0.01;
        const moveY = (e.clientY - faceCenterY) * 0.01;
        face.style.transform = `translate(${moveX}px, ${moveY}px)`;

        if (e.clientX < faceCenterX - 200) {
            face.textContent = faces.lookLeft;
        } else if (e.clientX > faceCenterX + 200) {
            face.textContent = faces.lookRight;
        } else {
            face.textContent = faces.awake;
        }
    });

    document.addEventListener('mousedown', () => face.textContent = faces.clicked);
    document.addEventListener('mouseup', () => face.textContent = faces.awake);
    face.addEventListener('mouseenter', () => face.textContent = faces.happy);

    resetIdle();
</script>
{{ end }}
